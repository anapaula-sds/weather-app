<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Previsão do tempo em tempo real para qualquer cidade do mundo.">
  <title>🌤️ Previsão do Tempo</title>
  <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>

  <!-- ── Camadas de animação (ficam atrás de tudo, z-index:0) ── -->
  <div class="sun-glow"></div>

  <div class="cloud-layer">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
  </div>

  <div class="rain-container" id="rain-container"></div>
  <div class="fog-layer"></div>

  <!-- ── App (z-index:10) ── -->
  <div class="app-wrapper">
    <div class="app-container">

      <!-- Cabeçalho -->
      <header class="app-header">
        <span class="weather-icon-big" id="header-icon">🌤️</span>
        <h1>Previsão do Tempo</h1>
        <p>Descubra o clima em qualquer cidade do mundo</p>
      </header>

      <main>

        <!-- Formulário de busca -->
        <form id="search-form" class="search-form" novalidate>
          <input
            type="text"
            id="city-input"
            placeholder="Digite o nome da cidade..."
            autocomplete="off"
            aria-label="Nome da cidade"
          >
          <button type="submit" id="search-btn">🔍 Buscar</button>
        </form>

        <!-- Toggle de unidade -->
        <div class="unit-toggle" role="group" aria-label="Unidade de temperatura">
          <button id="btn-celsius"     class="active">°C</button>
          <button id="btn-fahrenheit"            >°F</button>
        </div>

        <!-- Mensagem de status (loading / erro) -->
        <div id="status-message" class="status-message" role="status" aria-live="polite"></div>

        <!-- Resultado do clima -->
        <section id="weather-result" class="weather-result hidden" aria-label="Resultado do clima"></section>

      </main>
    </div><!-- /.app-container -->
  </div><!-- /.app-wrapper -->

  <script type="module" src="./src/main.js"></script>
</body>
</html>
